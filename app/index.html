<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microsoft Security News</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">2026 • Microsoft Security</p>
        <h1>Nyhetsdashboard for Microsoft Security</h1>
        <p class="hero-copy">Se hva som faktisk har landet i Microsofts sikkerhetsportefølje, filtrer på produkt og status, og prioriter det som krever handling før det blir et driftsproblem.</p>
        <div class="hero-stats" id="hero-stats"></div>
      </header>

      <section class="controls">
        <label class="search control-wide">
          <span>Søk</span>
          <input id="search" type="search" placeholder="Søk i tittel, analyse, produkt eller tema" />
        </label>
        <label>
          <span>Produkt</span>
          <select id="product-filter"></select>
        </label>
        <label>
          <span>Måned</span>
          <select id="month-filter"></select>
        </label>
        <label>
          <span>Status</span>
          <select id="stage-filter"></select>
        </label>
        <label>
          <span>Kilde</span>
          <select id="source-filter"></select>
        </label>
        <label>
          <span>Tema</span>
          <select id="theme-filter"></select>
        </label>
        <label>
          <span>Påvirkning</span>
          <select id="impact-filter"></select>
        </label>
        <label>
          <span>Sorter</span>
          <select id="sort-filter">
            <option value="priority">Mest kritisk først</option>
            <option value="newest">Nyeste først</option>
            <option value="product">Produkt A–Å</option>
          </select>
        </label>
      </section>

      <section class="layout">
        <aside class="sidebar">
          <div class="panel">
            <h2>Produkter</h2>
            <div id="product-chips" class="chip-list"></div>
          </div>
          <div class="panel">
            <h2>Rask prioritering</h2>
            <ul class="insight-list" id="priority-list"></ul>
          </div>
        </aside>

        <main>
          <div class="results-header">
            <div>
              <h2>Oppdateringer</h2>
              <p id="result-count"></p>
            </div>
            <div id="active-filters" class="chip-list"></div>
          </div>
          <div id="news-list" class="news-list"></div>
        </main>
      </section>
    </div>

    <template id="card-template">
      <article class="card">
        <div class="card-top">
          <div>
            <div class="badge-row">
              <span class="badge badge-stage"></span>
              <span class="badge badge-impact"></span>
              <span class="badge badge-source"></span>
            </div>
            <p class="meta"></p>
            <h3></h3>
          </div>
          <a class="source-link" target="_blank" rel="noreferrer">Kilde</a>
        </div>
        <p class="summary"></p>
        <dl class="detail-grid">
          <div><dt>Produkt</dt><dd class="detail-product"></dd></div>
          <div><dt>Kategori</dt><dd class="detail-category"></dd></div>
          <div><dt>Kilde</dt><dd class="detail-source"></dd></div>
          <div><dt>Publisert</dt><dd class="detail-date"></dd></div>
        </dl>
        <div class="tags"></div>
        <div class="analysis-block">
          <h4>Hvorfor dette betyr noe</h4>
          <ul class="analysis-list"></ul>
        </div>
      </article>
    </template>

    <script type="module" src="./main.js"></script>
  </body>
</html>
